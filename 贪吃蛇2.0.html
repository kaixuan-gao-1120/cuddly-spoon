<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <!-- PWA 配置：让网页看起来像 APP -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a1a">
    <title>贪吃蛇大作战</title>
    <style>
        :root {
            --primary: #4caf50;
            --bg: #121212;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            justify-content: space-around;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        .header {
            padding-top: env(safe-area-inset-top);
            text-align: center;
        }
        #game-board {
            position: relative;
            background: #1e1e1e;
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        canvas { display: block; border-radius: 6px; }
        
        /* 虚拟手柄优化 */
        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-template-rows: repeat(2, 80px);
            gap: 15px;
            padding-bottom: env(safe-area-inset-bottom);
            margin-bottom: 20px;
        }
        .key {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .key:active {
            background: var(--primary);
            transform: scale(0.9);
        }
        .score-board {
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="score-board">SCORE: <span id="score">0</span></div>
    </div>

    <div id="game-board">
        <canvas id="snakeCanvas"></canvas>
    </div>

    <div class="d-pad">
        <div class="key" style="grid-column: 2" ontouchstart="setDir(0,-1)">↑</div>
        <div class="key" style="grid-column: 1; grid-row: 2" ontouchstart="setDir(-1,0)">←</div>
        <div class="key" style="grid-column: 2; grid-row: 2" ontouchstart="setDir(0,1)">↓</div>
        <div class="key" style="grid-column: 3; grid-row: 2" ontouchstart="setDir(1,0)">→</div>
    </div>

    <script>
        const canvas = document.getElementById('snakeCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        let snake, food, dx, dy, score, gameSpeed;

        function init() {
            const size = Math.floor((Math.min(window.innerWidth, window.innerHeight * 0.5) - 40) / gridSize) * gridSize;
            canvas.width = canvas.height = size;
            snake = [{x: 10, y: 10}];
            dx = 0; dy = -1; score = 0; gameSpeed = 150;
            spawnFood();
            run();
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * (canvas.width / gridSize)),
                y: Math.floor(Math.random() * (canvas.height / gridSize))
            };
        }

        function setDir(x, y) {
            if ((x !== 0 && dx === 0) || (y !== 0 && dy === 0)) {
                dx = x; dy = y;
            }
        }

        function run() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // 撞墙检测
            if (head.x < 0 || head.y < 0 || head.x >= canvas.width/gridSize || head.y >= canvas.height/gridSize) {
                alert("游戏结束！得分：" + score);
                return init();
            }

            // 撞身体检测
            for(let i=0; i<snake.length; i++) {
                if(snake[i].x === head.x && snake[i].y === head.y) return init();
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }

            // 绘图
            ctx.fillStyle = "#1e1e1e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#ff5252";
            ctx.fillRect(food.x*gridSize+2, food.y*gridSize+2, gridSize-4, gridSize-4);

            ctx.fillStyle = "#4caf50";
            snake.forEach(p => ctx.fillRect(p.x*gridSize+1, p.y*gridSize+1, gridSize-2, gridSize-2));

            setTimeout(run, gameSpeed);
        }

        window.onload = init;
        // 禁止缩放和双击
        document.addEventListener('touchstart', (e) => {
            if (e.touches.length > 1) e.preventDefault();
        }, {passive: false});
    </script>
</body>
</html>
